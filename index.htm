<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>ProjetCine</title>
		<link rel="stylesheet" href="./css/style.css" />
		<script src="./js/script.js" defer type="module"></script>
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
			integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
			crossorigin="anonymous"
			referrerpolicy="no-referrer"
		/>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
			rel="stylesheet"
		/>
	</head>

	<body>
		<header>
			<section id="imgHeader">
				<i class="fa-solid fa-film"></i>
			</section>
			<nav>
				<p>Films</p>
				<p>Séries</p>
				<p>Populaires</p>
			</nav>
		</header>
		<section id="recherche">
			<input type="text" placeholder="Rechercher.." />
			<i class="fa-solid fa-magnifying-glass"></i>
		</section>
		<div class="tendance">
			<h1>Tendance</h1>
			<input type="button" value="Aujourd'hui" />
			<input type="button" value="Cette Semaine" />
		</div>
		<div class="series">
			<h1>Séries TV</h1>
			<input type="button" value="Mieux Notées" />
			<input type="button" value="Populaires" />
		</div>
	</body>
</html>
